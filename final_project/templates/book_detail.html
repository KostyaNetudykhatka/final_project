{% extends 'base.html' %}
{% block content %}
<div class="book-detail">
    <h1>{{ book['title'] }}</h1>
    <h2>Автор: {{ book['author'] }}</h2>
    <p><strong>Рік видання:</strong> {{ book['year'] }}</p>
    {% if book['image_url'] %}
    <img src="{{ book['image_url'] }}" alt="Обкладинка" class="large-img">
    {% endif %}
    <p><strong>Опис:</strong></p>
    <p>{{ book['description'] }}</p>
    <a href="{{ url_for('library') }}" class="button">Повернутися</a>
</div>
{% endblock %}
