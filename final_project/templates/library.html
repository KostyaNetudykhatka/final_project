{% extends 'base.html' %}
{% block content %}
<h1>Бібліотека</h1>

<section class="add-book-form">
    <h2>Додати книгу</h2>
    <form action="{{ url_for('add_book') }}" method="POST">
        <input type="text" name="title" placeholder="Назва книги" required>
        <input type="text" name="author" placeholder="Автор" required>
        <textarea name="description" placeholder="Опис"></textarea>
        <input type="number" name="year" placeholder="Рік видання">
        <input type="text" name="image_url" placeholder="URL картинки">
        <button type="submit">Додати</button>
    </form>
</section>

<section class="book-list">
    <h2>Список книг</h2>
    <div class="books-container">
        {% for book in books %}
        <div class="book-card">
            {% if book['image_url'] %}
            <img src="{{ book['image_url'] }}" alt="Обкладинка" class="small-img">
            {% endif %}
            <h3>{{ book['title'] }}</h3>
            <p><strong>Автор:</strong> {{ book['author'] }}</p>
            <p><strong>Рік:</strong> {{ book['year'] }}</p>
            <a href="{{ url_for('book_detail', id=book['id']) }}" class="button">Детальніше</a>
            <a href="{{ url_for('delete_book', id=book['id']) }}" class="button delete">Видалити</a>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
